name: News Digest

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Ignorer le créneau horaire et forcer l'exécution (test)"
        type: boolean
        default: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEST_EMAIL: ${{ secrets.DEST_EMAIL }}
          FORCE_RUN: ${{ inputs.force_run && '1' || '' }}
